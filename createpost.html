<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Post</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
padding:20px 12px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#1565c0;
margin-bottom:20px;
}

textarea{
width:100%;
height:180px;
padding:15px;
font-size:17px;
border-radius:15px;
border:2px solid #ddd;
resize:none;
outline:none;
margin-bottom:20px;
}

textarea:focus{
border-color:#1565c0;
}

.fileBox{
background:#f6fbff;
padding:15px;
border-radius:15px;
margin-bottom:18px;
}

.fileBox label{
display:block;
font-weight:600;
color:#1565c0;
margin-bottom:8px;
}

input[type=file]{
width:100%;
padding:10px;
}

#preview{
margin-top:20px;
text-align:center;
}

#preview img{

max-width:100%;
border-radius:15px;
margin-top:10px;

}

#preview video{

width:100%;
border-radius:15px;
margin-top:10px;

}

button{

width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:15px;
background:#1565c0;
color:white;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#0d47a1;

}

</style>

</head>

<body>

<div class="container">

<h1>😂 Create a Post</h1>

<textarea
id="postText"
placeholder="What's on your mind today?">
</textarea>

<div class="fileBox">

<label>📷 Upload Image</label>

<input
type="file"
id="imageInput"
accept="image/*">

</div>

<div class="fileBox">

<label>🎥 Upload Video</label>

<input
type="file"
id="videoInput"
accept="video/*">

</div>

<div id="preview"></div>

<button id="postBtn">

🚀 Post

</button>

</div>

<script type="module" src="createpost.js"></script>

</body>
</html>
