<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Latest Posts</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.backBtn{
display:inline-block;
text-decoration:none;
background:#1565c0;
color:white;
padding:10px 18px;
border-radius:10px;
margin-bottom:20px;
}

h1{
text-align:center;
color:#1565c0;
margin-bottom:25px;
}

#feed{
display:flex;
flex-direction:column;
gap:20px;
}

.post{
background:#f8fbff;
padding:18px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.post h3{
color:#1565c0;
margin-bottom:8px;
}

.post small{
color:#666;
}

.post p{
margin:15px 0;
line-height:1.7;
}

.actions{
display:flex;
gap:25px;
font-size:15px;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<a href="home.html" class="backBtn">⬅ Back to Home</a>

<h1>📰 Latest Posts</h1>

<div id="feed">

<p style="text-align:center;color:#777;">
Loading posts...
</p>

</div>

</div>

<script type="module" src="feed.js"></script>

</body>
</html>
