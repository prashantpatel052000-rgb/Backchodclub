<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Private Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#1565c0;
color:white;
padding:15px;
display:flex;
align-items:center;
gap:12px;
}

#backBtn{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

#chatName{
font-size:20px;
font-weight:600;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.inputArea{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

#messageInput{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:12px;
font-size:16px;
}

#sendBtn{
margin-left:10px;
padding:12px 20px;
background:#1565c0;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

.message{
max-width:75%;
padding:10px 15px;
margin:8px 0;
border-radius:15px;
word-wrap:break-word;
}

.myMessage{
background:#1565c0;
color:white;
margin-left:auto;
text-align:right;
}

.otherMessage{
background:#e0e0e0;
color:black;
margin-right:auto;
}

</style>

</head>

<body>

<div class="header">

<button id="backBtn">
←
</button>

<div id="chatName">
Loading...
</div>

</div>

<div id="messages">

</div>

<div class="inputArea">

<input
type="text"
id="messageInput"
placeholder="Type a message...">

<button id="sendBtn">

Send

</button>

</div>

<<script type="module" src="chat.js"></script>
