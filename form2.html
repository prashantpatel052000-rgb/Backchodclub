<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Membership Approved</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 25px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, .2);
    }
    
    .success {
      font-size: 80px;
      margin-bottom: 15px;
    }
    
    h1 {
      color: #1565c0;
      font-size: 42px;
      margin-bottom: 20px;
    }
    
    p {
      font-size: 22px;
      color: #444;
      margin: 15px 0;
      line-height: 1.6;
    }
    
    .highlight {
      color: #1565c0;
      font-weight: bold;
    }
    
    a {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 35px;
      background: linear-gradient(90deg, #2196f3, #1565c0);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 22px;
      font-weight: 600;
      transition: .3s;
    }
    
    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(33, 150, 243, .4);
    }
  </style>
</head>

<body>
  
  <div class="container">
    
    <div class="success">🎉</div>
    
    <h1>Congratulations!</h1>
    
    <p>Your application has been <span class="highlight">approved successfully.</span></p>
    
    <p>You are now a <span class="highlight">Proud Member</span> of the Backchod Club.</p>
    
    <p>Welcome aboard! 😎</p>
    
    <a href="index.html">⬅ Go Back</a>
    
  </div>
  
</body>

</html>
